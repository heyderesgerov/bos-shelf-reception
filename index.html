<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOS Shelf - Resepsiyon Sistemi</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); display: inline-block; }
        h1 { color: #333; }
        p { color: #666; }
        .btn { display: inline-block; padding: 10px 20px; margin: 10px; color: white; background-color: #007bff; border: none; border-radius: 5px; text-decoration: none; cursor: pointer; }
        .btn-admin { background-color: #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BOS Shelf Qəbul Sistemi</h1>
        <p>Sistem uğurla quraşdırıldı!</p>
        <button class="btn" onclick="alert('Qonaq qeydiyyatı tezliklə aktiv olacaq!')">Qonaq Girişi</button>
        <button class="btn btn-admin" onclick="alert('Admin Panelə keçid tezliklə aktiv olacaq!')">Admin Panel</button>
    </div>
</body>
</html>
