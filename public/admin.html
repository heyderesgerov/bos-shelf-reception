<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOS Shelf - Admin Panel Giriş</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background-color: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; }
        .login-container { background: #1e293b; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 400px; box-sizing: border-box; text-align: center; }
        h1 { font-size: 24px; margin-bottom: 8px; color: #3b82f6; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 14px; color: #cbd5e1; margin-bottom: 6px; font-weight: 500; }
        input { width: 100%; padding: 12px; box-sizing: border-box; border: 2px solid #334155; border-radius: 8px; background: #0f172a; color: white; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #3b82f6; }
        button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #2563eb; }
        .error-msg { color: #ef4444; font-size: 14px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Admin Panelinə Giriş</h1>
        <p>Davam etmək üçün hesab məlumatlarınızı daxil edin</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">İstifadəçi adı</label>
                <input type="text" id="username" required placeholder="Məsələn: admin">
            </div>
            
            <div class="form-group">
                <label for="password">Şifrə</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            
            <button type="submit">Daxil ol</button>
            <div id="errorMsg" class="error-msg">İstifadəçi adı və ya şifrə yanlışdır!</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if(user === "admin" && pass === "12345") {
                alert("Giriş uğurludur! (Baza qoşulanda bura idarəetmə paneli gələcək)");
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
